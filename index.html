<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-1</title>
    <link rel="shortcut icon" href="./assets/pikachu.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <div class="main">
        <div class="content">
            <div class="left">
                <div class="poke-logo">
                      <img class="logo" src="./assets/download-Photoroom (1).png" alt="">
                </div>
                <div class="left-text">
                    <div class="subheading"><span>POKEMON GEN I</span></div>
                    <div class="heading"><h1>Pikachu</h1></div>
                    <div class="description">
                       <p>
                        Pikachu is an Electric-type Pokémon introduced <br />
                        in Generation I. Pikachu are small, chubby, <br />
                        and incredibly cute mouse-like Pokémon. <br />
                        They are almost completely covered by <br> yellow fur.
                       </p>
                    </div>
                    <div class="index">
                      <div class="line"></div>
                      <div class="number">01 / 08</div>
                    </div>
                </div>
                <div class="poke-ball">
                      <img class="ball" src="./assets/pokemonball.png" alt="">
                </div>
            </div>
             <img class="pika-img" src="./assets/pikachu.png" alt="">
            <div class="right">
                <i class="ri-menu-line"></i>
                <div class="circles">
                    <div class="white-circle" id="black-circle"></div>
                    <div class="white-circle"></div>
                    <div class="white-circle"></div>
                    <div class="white-circle"></div>
                    <div class="white-circle"></div>
                </div>
            </div>
        </div>
    </div>
